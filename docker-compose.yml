version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: articulate-backend
    ports:
      - '8080:8080'
      - '9090:9090'
    environment:
      NODE_ENV: development
      PORT: 8080
      WS_URL: ws://localhost:8080
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-test-key}
      OPENAI_MODEL: gpt-3.5-turbo
      WHISPER_MODEL: small
      USE_LOCAL_WHISPER: 'false'
      LOG_LEVEL: debug
      LOG_FORMAT: json
    volumes:
      - ./server/src:/app/src
      - /app/node_modules
    networks:
      - articulate
    restart: unless-stopped
    command: yarn dev

networks:
  articulate:
    driver: bridge
