<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Articulate Settings</title>
    <link rel="stylesheet" href="styles/ui.css" />
    <style>
      body {
        width: 350px;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #fafafa;
      }

      .popup-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 16px;
        border-bottom: 1px solid #ddd;
      }

      .popup-header h1 {
        margin: 0;
        font-size: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .popup-body {
        padding: 16px;
      }

      .setting-group {
        margin-bottom: 16px;
        padding-bottom: 16px;
        border-bottom: 1px solid #eee;
      }

      .setting-group:last-child {
        border-bottom: none;
      }

      .setting-label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: #333;
        margin-bottom: 8px;
      }

      .setting-description {
        display: block;
        font-size: 12px;
        color: #999;
        margin-top: 4px;
      }

      select,
      input[type='text'] {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 13px;
        font-family: inherit;
        box-sizing: border-box;
      }

      select:focus,
      input[type='text']:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .checkbox-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      input[type='checkbox'] {
        cursor: pointer;
      }

      .button-group {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }

      button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-primary {
        background: #667eea;
        color: white;
      }

      .btn-primary:hover {
        background: #5568d3;
      }

      .btn-secondary {
        background: #eee;
        color: #333;
      }

      .btn-secondary:hover {
        background: #ddd;
      }

      .status {
        padding: 8px 12px;
        border-radius: 4px;
        font-size: 12px;
        margin-top: 8px;
        display: none;
      }

      .status.show {
        display: block;
      }

      .status.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .status.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .footer {
        padding: 12px 16px;
        border-top: 1px solid #eee;
        font-size: 11px;
        color: #999;
        text-align: center;
      }

      .footer a {
        color: #667eea;
        text-decoration: none;
      }

      .footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="popup-header">
      <h1>🎙️ Articulate</h1>
    </div>

    <div class="popup-body">
      <!-- Mode Setting -->
      <div class="setting-group">
        <label for="mode" class="setting-label">Voice Mode</label>
        <select id="mode">
          <option value="polished">Polished (AI-enhanced)</option>
          <option value="raw">Raw (Verbatim)</option>
        </select>
        <span class="setting-description"
          >Polished mode cleans up grammar and removes fillers</span
        >
      </div>

      <!-- Backend URL Setting -->
      <div class="setting-group">
        <label for="backendUrl" class="setting-label">Backend URL</label>
        <input
          type="text"
          id="backendUrl"
          placeholder="ws://localhost:8080"
          value="ws://localhost:8080"
        />
        <span class="setting-description">WebSocket server address</span>
      </div>

      <!-- Auto Polish Setting -->
      <div class="setting-group">
        <div class="checkbox-group">
          <input type="checkbox" id="autoPolish" checked />
          <label for="autoPolish" class="setting-label" style="margin: 0"
            >Auto-Polish</label
          >
        </div>
        <span class="setting-description">Automatically polish text after transcription</span>
      </div>

      <!-- Show Confirmation Setting -->
      <div class="setting-group">
        <div class="checkbox-group">
          <input type="checkbox" id="showConfirmation" checked />
          <label for="showConfirmation" class="setting-label" style="margin: 0"
            >Show Confirmation</label
          >
        </div>
        <span class="setting-description">Confirm text before inserting into field</span>
      </div>

      <!-- Theme Setting -->
      <div class="setting-group">
        <label for="theme" class="setting-label">Theme</label>
        <select id="theme">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
          <option value="auto">Auto (System)</option>
        </select>
      </div>

      <!-- Status Message -->
      <div id="status" class="status"></div>

      <!-- Buttons -->
      <div class="button-group">
        <button class="btn-secondary" id="resetBtn">Reset</button>
        <button class="btn-primary" id="saveBtn">Save Settings</button>
      </div>
    </div>

    <div class="footer">
      <p>
        Articulate v0.1.0 |
        <a href="https://github.com/yourusername/articulate" target="_blank">GitHub</a> |
        <a href="https://articulate.dev/privacy" target="_blank">Privacy</a>
      </p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
